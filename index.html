<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>推し推せ AKIBA</title>
    <script charset="utf-8" src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
    <style>
        * { box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            margin: 0;
            padding: 16px;
            background-color: #f5f5f5;
            color: #333;
        }
        .container { max-width: 600px; margin: 0 auto; }
        h1 {
            color: #ff69b4;
            text-align: center;
            margin: 0 0 16px 0;
            font-size: 24px;
        }
        .header-card {
            background: white;
            padding: 16px;
            border-radius: 10px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
            margin-bottom: 16px;
            text-align: center;
        }
        .user-name { font-size: 18px; font-weight: bold; margin: 8px 0 4px 0; }
        .role {
            display: inline-block;
            padding: 3px 10px;
            background: #ff69b4;
            color: white;
            border-radius: 15px;
            font-size: 11px;
            font-weight: bold;
        }
        .role.manager { background: #6366f1; }
        .section {
            background: white;
            padding: 16px;
            border-radius: 10px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
            margin-bottom: 16px;
        }
        .section-title {
            font-size: 16px;
            font-weight: bold;
            color: #ff69b4;
            margin: 0 0 12px 0;
            padding-bottom: 8px;
            border-bottom: 2px solid #ffe0f0;
        }
        .shift-item {
            padding: 10px 12px;
            margin-bottom: 6px;
            background: #fafafa;
            border-radius: 6px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .shift-item.leader { background: #e6ffe6; border-left: 4px solid #00cc00; }
        .shift-item.kabuki_help { background: #ffe6f9; border-left: 4px solid #ff00ff; }
        .shift-item.absent { background: #ffe6e6; border-left: 4px solid #ff0000; }
        .shift-item.late { background: #f0e6ff; border-left: 4px solid #9900ff; }
        .shift-date { font-weight: bold; font-size: 14px; color: #333; }
        .shift-time { color: #666; font-size: 14px; }
        .shift-tag {
            display: inline-block;
            padding: 2px 8px;
            border-radius: 10px;
            font-size: 10px;
            font-weight: bold;
            margin-left: 6px;
        }
        .tag-leader { background: #00cc00; color: white; }
        .tag-kabuki_help { background: #ff00ff; color: white; }
        .tag-absent { background: #ff0000; color: white; }
        .tag-late { background: #9900ff; color: white; }
        .summary {
            text-align: center;
            margin: 16px 0;
            padding: 12px;
            background: #fff5fa;
            border-radius: 8px;
            font-size: 14px;
            color: #666;
        }
        .summary strong { color: #ff69b4; font-size: 18px; }
        .day-group {
            margin-bottom: 10px;
            border: 1px solid #eee;
            border-radius: 6px;
            overflow: hidden;
        }
        .day-header {
            padding: 10px 14px;
            background: #fff5fa;
            cursor: pointer;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-weight: bold;
            user-select: none;
        }
        .day-header:hover { background: #ffe0f0; }
        .day-toggle { transition: transform 0.2s; color: #ff69b4; }
        .day-toggle.open { transform: rotate(90deg); }
        .day-body { display: none; padding: 10px; background: white; }
        .day-body.open { display: block; }
        .cast-line {
            padding: 6px 10px;
            margin: 2px 0;
            background: #fafafa;
            border-radius: 4px;
            display: flex;
            justify-content: space-between;
            font-size: 13px;
        }
        .loading { text-align: center; color: #999; padding: 40px 0; }
        .error {
            background: #fee;
            border: 1px solid #fcc;
            color: #c00;
            padding: 15px;
            border-radius: 8px;
            margin: 20px 0;
        }
        .empty { text-align: center; color: #999; padding: 20px; font-size: 14px; }
        .footer {
            text-align: center;
            margin: 20px 0 10px 0;
            color: #999;
            font-size: 11px;
        }

        /* シフト希望提出 */
        .deadline-info {
            background: #fff5fa;
            padding: 10px 14px;
            border-radius: 6px;
            margin-bottom: 12px;
            font-size: 13px;
            color: #666;
        }
        .deadline-info strong { color: #ff69b4; }
        .warning-banner {
            background: #d32f2f;
            color: #fff;
            padding: 14px;
            border-radius: 8px;
            margin-bottom: 12px;
            text-align: center;
            font-weight: bold;
            font-size: 14px;
            line-height: 1.5;
        }
        .warning-banner.orange { background: #ff9800; }
        .warning-banner .big { font-size: 16px; display: block; margin-bottom: 4px; }
        .warning-banner .count {
            background: #fff;
            color: #d32f2f;
            padding: 3px 8px;
            border-radius: 4px;
            display: inline-block;
            margin-top: 4px;
            font-size: 12px;
        }
        .warning-banner.orange .count { color: #ff9800; }
        .day-row {
            display: flex;
            align-items: center;
            padding: 10px 0;
            gap: 6px;
            border-bottom: 1px solid #eee;
        }
        .day-row:last-child { border-bottom: none; }
        .day-row.weekend .day-text { color: #c00; }
        .day-label {
            width: 80px;
            display: flex;
            flex-direction: column;
            gap: 2px;
            flex-shrink: 0;
        }
        .day-text { font-size: 13px; font-weight: bold; }
        .hours-tag {
            font-size: 10px;
            color: #856404;
            background: #fff3cd;
            padding: 2px 5px;
            border-radius: 3px;
            align-self: flex-start;
            white-space: nowrap;
        }
        .event-tag {
            font-size: 10px;
            color: #c2185b;
            background: #fce4ec;
            padding: 2px 5px;
            border-radius: 3px;
            align-self: flex-start;
            white-space: nowrap;
        }
        .day-row select {
            padding: 6px 4px;
            font-size: 13px;
            border: 1px solid #ccc;
            border-radius: 4px;
            flex: 1;
            min-width: 0;
            background: #fff;
        }
        .day-row .tilde { font-size: 13px; color: #666; }
        .clear-btn {
            background: none;
            border: 1px solid #ddd;
            color: #666;
            font-size: 11px;
            padding: 5px 7px;
            border-radius: 4px;
            cursor: pointer;
        }
        .note-input {
            width: 100%;
            min-height: 70px;
            padding: 8px;
            font-size: 13px;
            border: 1px solid #ccc;
            border-radius: 4px;
            resize: vertical;
            font-family: inherit;
            margin-top: 8px;
        }
        .note-label {
            display: block;
            font-size: 13px;
            font-weight: bold;
            margin-top: 12px;
            color: #333;
        }
        .submit-btn {
            width: 100%;
            padding: 14px;
            background: #06c755;
            color: #fff;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: bold;
            margin-top: 16px;
            cursor: pointer;
        }
        .submit-btn:disabled { background: #aaa; }
        .msg {
            text-align: center;
            margin-top: 12px;
            font-weight: bold;
            min-height: 22px;
            font-size: 13px;
        }
        .msg-ok { color: #06c755; }
        .msg-err { color: #c00; }

        /* BASE注文管理 */
        .base-tab-bar {
            display: flex;
            gap: 8px;
            margin-bottom: 12px;
        }
        .base-tab {
            flex: 1;
            padding: 8px;
            text-align: center;
            border-radius: 6px;
            font-size: 13px;
            font-weight: bold;
            cursor: pointer;
            border: 2px solid #eee;
            background: #fafafa;
            color: #999;
            transition: all 0.15s;
        }
        .base-tab.active {
            border-color: #ff69b4;
            background: #fff0f7;
            color: #ff69b4;
        }
        .base-panel { display: none; }
        .base-panel.active { display: block; }
        .base-order-card {
            border: 1px solid #eee;
            border-radius: 8px;
            padding: 12px;
            margin-bottom: 10px;
            background: #fff;
            transition: all 0.3s;
        }
        .base-order-card.pending-payment {
            border-left: 4px solid #f44336;
            background: #fff8f8;
        }
        .base-order-card.waiting {
            border-left: 4px solid #ff9800;
            background: #fffbf5;
        }
        .base-order-card.done {
            border-left: 4px solid #ccc;
            background: #f9f9f9;
            opacity: 0.7;
        }
        .base-order-card.handled-anim {
            opacity: 0;
            transform: translateX(30px);
        }
        .base-order-meta {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 6px;
        }
        .base-order-id { font-size: 11px; color: #aaa; }
        .base-payment-badge {
            font-size: 11px;
            font-weight: bold;
            padding: 2px 8px;
            border-radius: 10px;
        }
        .badge-unpaid { background: #ffebee; color: #c62828; }
        .badge-paid { background: #e8f5e9; color: #2e7d32; }
        .badge-cancel { background: #eeeeee; color: #757575; }
        .base-order-product {
            font-size: 14px;
            font-weight: bold;
            color: #333;
            margin-bottom: 4px;
        }
        .base-order-sub {
            font-size: 12px;
            color: #888;
            margin-bottom: 4px;
        }
        .base-order-note {
            font-size: 12px;
            color: #555;
            background: #fffde7;
            border-radius: 4px;
            padding: 4px 8px;
            margin-bottom: 8px;
        }
        .base-handle-btn {
            width: 100%;
            padding: 10px;
            background: #ff69b4;
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 14px;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.2s;
        }
        .base-handle-btn:disabled {
            background: #ccc;
            cursor: default;
        }
        .base-handle-btn.done-btn {
            background: #e8f5e9;
            color: #2e7d32;
            font-size: 13px;
        }
        .base-pending-count {
            display: inline-block;
            background: #f44336;
            color: white;
            border-radius: 10px;
            font-size: 11px;
            font-weight: bold;
            padding: 1px 7px;
            margin-left: 6px;
            vertical-align: middle;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>推し推せ AKIBA</h1>
        <div id="content" class="loading">読み込み中...</div>
        <div class="footer">推し推せ AKIBA 業務アプリ v0.4</div>
    </div>

    <script>
        const LIFF_ID = '2010239964-vlVhNnKz';
        const GAS_URL = 'https://script.google.com/macros/s/AKfycbxR-0pqKO-VCLUdxa5u2G98LSpyLox32X_4Sl36TyAhZAHyV58Na_xQ6MCkb44DmxYB_w/exec';

        let castData = null;
        let lineProfile = null;
        let shiftRequestData = null;

        async function main() {
            try {
                await liff.init({ liffId: LIFF_ID });

                if (!liff.isLoggedIn()) {
                    liff.login();
                    return;
                }

                lineProfile = await liff.getProfile();
                
                const castInfoUrl = `${GAS_URL}?action=getCastInfo&userId=${lineProfile.userId}`;
                const castResponse = await fetch(castInfoUrl);
                const castResult = await castResponse.json();

                if (!castResult.success) {
                    showNotRegistered(castResult);
                    return;
                }

                castData = castResult.data;

                if (castData.isManager) {
                    await showManagerView();
                } else {
                    await showCastView();
                }

            } catch (error) {
                showError(error);
            }
        }

        async function showManagerView() {
            const allShiftsUrl = `${GAS_URL}?action=getAllShifts`;
            const response = await fetch(allShiftsUrl);
            const result = await response.json();

            let html = renderHeader(true);

            if (!result.success) {
                html += renderErrorSection('全体シフトの取得に失敗しました');
            } else {
                const akibaData = result.data.current.akiba;
                if (!akibaData || !akibaData.shiftsByDate) {
                    html += `<div class="section"><div class="empty">シフトデータがありません</div></div>`;
                } else {
                    html += renderAllShiftsSection(akibaData);
                }
            }

            html += renderShiftRequestSection();
            html += renderBaseSection();

            document.getElementById('content').innerHTML = html;
            document.getElementById('content').classList.remove('loading');
            
            await loadShiftRequestForm();
            await loadBaseOrders();
        }

        async function showCastView() {
            const myShiftsUrl = `${GAS_URL}?action=getMyShifts&userId=${lineProfile.userId}`;
            const response = await fetch(myShiftsUrl);
            const result = await response.json();

            let html = renderHeader(false);

            if (!result.success) {
                html += renderErrorSection(result.error || 'シフトの取得に失敗しました');
            } else {
                html += renderMyShiftsSection(result.data);
            }

            html += renderShiftRequestSection();
            html += renderBaseSection();

            document.getElementById('content').innerHTML = html;
            document.getElementById('content').classList.remove('loading');
            
            await loadShiftRequestForm();
            await loadBaseOrders();
        }

        function renderHeader(isManager) {
            const roleLabel = isManager ? '管理者' : 'キャスト';
            const roleClass = isManager ? 'role manager' : 'role';
            return `
                <div class="header-card">
                    <div class="user-name">${castData.name} さん</div>
                    <span class="${roleClass}">${roleLabel}</span>
                    <div style="color: #999; font-size: 12px; margin-top: 6px;">${castData.store}</div>
                </div>
            `;
        }

        function renderMyShiftsSection(data) {
            const shifts = data.current.shifts || [];
            const sheetName = data.current.sheetName || '';

            let html = `
                <div class="section">
                    <div class="section-title">📅 自分のシフト${sheetName ? '（' + sheetName + '）' : ''}</div>
            `;

            if (shifts.length === 0) {
                html += `<div class="empty">今期のシフトはありません</div>`;
            } else {
                shifts.forEach(s => {
                    const statusTag = getStatusTag(s.status);
                    html += `
                        <div class="shift-item ${s.status}">
                            <div>
                                <div class="shift-date">${s.date}</div>
                                <div class="shift-time">${s.start} - ${s.end}</div>
                            </div>
                            ${statusTag}
                        </div>
                    `;
                });

                html += `
                    <div class="summary">
                        出勤数: <strong>${shifts.length}</strong>日
                    </div>
                `;
            }

            html += `</div>`;
            return html;
        }

        function renderAllShiftsSection(akibaData) {
            const dates = Object.keys(akibaData.shiftsByDate);
            const totalShifts = dates.reduce((sum, d) => sum + akibaData.shiftsByDate[d].length, 0);

            let html = `
                <div class="section">
                    <div class="section-title">📅 全体シフト（${akibaData.sheetName}）</div>
                    <div class="summary">
                        対象期間: ${dates.length}日 / 延べ出勤: <strong>${totalShifts}</strong>名
                    </div>
            `;

            dates.forEach((date, index) => {
                const casts = akibaData.shiftsByDate[date];
                if (casts.length === 0) return;

                const dayId = `day-${index}`;
                html += `
                    <div class="day-group">
                        <div class="day-header" onclick="toggleDay('${dayId}')">
                            <span>${date} - ${casts.length}名</span>
                            <span class="day-toggle" id="${dayId}-toggle">▶</span>
                        </div>
                        <div class="day-body" id="${dayId}-body">
                `;
                casts.forEach(c => {
                    html += `
                        <div class="cast-line">
                            <span>${c.name}</span>
                            <span style="color: #666;">${c.start} - ${c.end}</span>
                        </div>
                    `;
                });
                html += `</div></div>`;
            });

            html += `</div>`;
            return html;
        }

        function renderShiftRequestSection() {
            return `
                <div class="section" id="shift-request-section">
                    <div class="section-title">📝 シフト希望提出</div>
                    <div id="shift-request-content" class="loading">読み込み中...</div>
                </div>
            `;
        }

        // ==========================================
        // BASE注文管理
        // ==========================================

        function renderBaseSection() {
            return `
                <div class="section" id="base-section">
                    <div class="section-title">📦 BASE注文管理 <span id="base-pending-badge"></span></div>
                    <div id="base-content" class="loading">読み込み中...</div>
                </div>
            `;
        }

        async function loadBaseOrders() {
            try {
                const url = `${GAS_URL}?action=getBaseOrders&userId=${lineProfile.userId}`;
                const response = await fetch(url);
                const result = await response.json();

                if (!result.success) {
                    document.getElementById('base-content').innerHTML =
                        `<div class="error">${escapeHtml(result.error || '取得に失敗しました')}</div>`;
                    return;
                }

                renderBaseOrders(result);
            } catch (e) {
                document.getElementById('base-content').innerHTML =
                    `<div class="error">エラー: ${escapeHtml(e.message)}</div>`;
            }
        }

        function renderBaseOrders(result) {
            const pending = result.pending || [];
            const thisMonth = result.thisMonth || [];

            // 未対応バッジ
            const badge = document.getElementById('base-pending-badge');
            if (badge && pending.length > 0) {
                badge.innerHTML = `<span class="base-pending-count">${pending.length}</span>`;
            }

            let html = `
                <div class="base-tab-bar">
                    <div class="base-tab active" id="tab-pending" onclick="switchBaseTab('pending')">
                        未対応${pending.length > 0 ? ` (${pending.length})` : ''}
                    </div>
                    <div class="base-tab" id="tab-thismonth" onclick="switchBaseTab('thismonth')">
                        今月 (${thisMonth.length})
                    </div>
                </div>
            `;

            // 未対応パネル
            html += `<div class="base-panel active" id="panel-pending">`;
            if (pending.length === 0) {
                html += `<div class="empty">✨ 未対応の注文はありません</div>`;
            } else {
                pending.forEach(order => {
                    html += renderBaseOrderCard(order, true);
                });
            }
            html += `</div>`;

            // 今月パネル
            html += `<div class="base-panel" id="panel-thismonth">`;
            if (thisMonth.length === 0) {
                html += `<div class="empty">今月の注文はありません</div>`;
            } else {
                thisMonth.forEach(order => {
                    const isPending = order.handleStatus === '未対応' || order.handleStatus === '';
                    html += renderBaseOrderCard(order, isPending);
                });
            }
            html += `</div>`;

            document.getElementById('base-content').innerHTML = html;
            document.getElementById('base-content').classList.remove('loading');
        }

        function renderBaseOrderCard(order, showBtn) {
            const paymentClass = order.paymentStatus === '入金待ち' ? 'pending-payment'
                               : order.paymentStatus === 'キャンセル' ? 'done'
                               : 'waiting';

            const badgeClass = order.paymentStatus === '入金待ち' ? 'badge-unpaid'
                             : order.paymentStatus === 'キャンセル' ? 'badge-cancel'
                             : 'badge-paid';

            const isDone = order.handleStatus === '対応済み' || order.handleStatus === '対応不要';

            const cardClass = isDone ? 'done' : paymentClass;

            let btnHtml = '';
            if (isDone) {
                btnHtml = `<button class="base-handle-btn done-btn" disabled>✓ 対応済み</button>`;
            } else if (showBtn) {
                btnHtml = `<button class="base-handle-btn" onclick="markHandled(this, ${order.rowIndex})">対応完了にする</button>`;
            }

            const noteHtml = order.note
                ? `<div class="base-order-note">📝 ${escapeHtml(order.note)}</div>`
                : '';

            return `
                <div class="base-order-card ${cardClass}" id="order-card-${order.rowIndex}">
                    <div class="base-order-meta">
                        <span class="base-order-id">${escapeHtml(order.orderDateStr)} / ${escapeHtml(order.orderId)}</span>
                        <span class="base-payment-badge ${badgeClass}">${escapeHtml(order.paymentStatus)}</span>
                    </div>
                    <div class="base-order-product">${escapeHtml(order.productName)} × ${order.quantity}</div>
                    <div class="base-order-sub">呼び名: ${escapeHtml(order.yobiName)} ／ ¥${Number(order.subtotal).toLocaleString()}</div>
                    ${noteHtml}
                    ${btnHtml}
                </div>
            `;
        }

        function switchBaseTab(tab) {
            document.querySelectorAll('.base-tab').forEach(el => el.classList.remove('active'));
            document.querySelectorAll('.base-panel').forEach(el => el.classList.remove('active'));
            document.getElementById(`tab-${tab}`).classList.add('active');
            document.getElementById(`panel-${tab}`).classList.add('active');
        }

        async function markHandled(btn, rowIndex) {
            if (!confirm('この注文を対応済みにしますか？')) return;

            btn.disabled = true;
            btn.textContent = '送信中...';

            try {
                const response = await fetch(GAS_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'text/plain;charset=utf-8' },
                    body: JSON.stringify({
                        action: 'markBaseOrderHandled',
                        userId: lineProfile.userId,
                        rowIndex: rowIndex
                    })
                });

                const result = await response.json();

                if (result.success) {
                    // カードをアニメーションで完了状態に
                    const card = document.getElementById(`order-card-${rowIndex}`);
                    if (card) {
                        card.classList.add('handled-anim');
                        setTimeout(() => {
                            card.classList.remove('base-order-card', 'pending-payment', 'waiting', 'handled-anim');
                            card.classList.add('base-order-card', 'done');
                            card.style.opacity = '';
                            card.style.transform = '';
                            btn.className = 'base-handle-btn done-btn';
                            btn.disabled = true;
                            btn.textContent = '✓ 対応済み';
                            // 未対応タブのカウント更新
                            refreshBaseTabCounts();
                        }, 300);
                    }
                } else {
                    alert('エラー: ' + (result.error || '失敗しました'));
                    btn.disabled = false;
                    btn.textContent = '対応完了にする';
                }
            } catch (e) {
                alert('エラー: ' + e.message);
                btn.disabled = false;
                btn.textContent = '対応完了にする';
            }
        }

        function refreshBaseTabCounts() {
            // 未対応パネル内のdone以外のカード数を数え直す
            const pendingPanel = document.getElementById('panel-pending');
            if (!pendingPanel) return;
            const remaining = pendingPanel.querySelectorAll('.base-order-card:not(.done)').length;
            const tabEl = document.getElementById('tab-pending');
            if (tabEl) {
                tabEl.textContent = `未対応${remaining > 0 ? ` (${remaining})` : ''}`;
            }
            const badge = document.getElementById('base-pending-badge');
            if (badge) {
                badge.innerHTML = remaining > 0
                    ? `<span class="base-pending-count">${remaining}</span>`
                    : '';
            }
        }

        // ==========================================
        // シフト希望提出
        // ==========================================

        function renderErrorSection(message) {
            return `<div class="error">${message}</div>`;
        }

        async function loadShiftRequestForm() {
            try {
                const url = `${GAS_URL}?action=getShiftRequestForm&userId=${lineProfile.userId}`;
                const response = await fetch(url);
                const result = await response.json();

                if (!result.success) {
                    document.getElementById('shift-request-content').innerHTML = 
                        `<div class="error">${result.error || 'フォームの取得に失敗しました'}</div>`;
                    return;
                }

                shiftRequestData = result.data;
                renderShiftRequestForm();
            } catch (error) {
                document.getElementById('shift-request-content').innerHTML = 
                    `<div class="error">エラー: ${error.message}</div>`;
            }
        }

        function renderShiftRequestForm() {
            const d = shiftRequestData;
            let html = '';

            if (d.isAfterDeadline) {
                html += `
                    <div class="warning-banner">
                        <span class="big">⚠️ 提出期限を過ぎています ⚠️</span>
                        提出は可能ですが、必ず期限内に提出するようお願いします
                        ${d.castLateCount > 0 ? `<div class="count">これまで ${d.castLateCount} 回 遅れています</div>` : ''}
                    </div>
                `;
            } else if (d.castLateCount > 0) {
                html += `
                    <div class="warning-banner orange">
                        <span class="big">⚠️ 過去の提出遅延について</span>
                        これまで <span class="count">${d.castLateCount} 回</span> 期限を過ぎて提出しています<br>
                        今回は期限内に提出をお願いします
                    </div>
                `;
            }

            html += `
                <div class="deadline-info">
                    対象: <strong>${d.period}</strong>分（${d.dates[0].label} 〜 ${d.dates[d.dates.length - 1].label}）<br>
                    📅 締切: <strong>${d.deadlineLabel}</strong>
                    <div style="font-size: 11px; color: #999; margin-top: 4px;">
                        出勤しない日は「--」のままにしてください。締切までは何度でも修正可能です。
                    </div>
                </div>
            `;

            html += `<div id="shift-rows">`;
            d.dates.forEach((date, i) => {
                const existing = d.existingShifts[i] || '';
                const parts = existing.split('-');
                const startVal = parts[0] || '';
                const endVal = parts[1] || '';

                html += `
                    <div class="day-row ${date.isWeekend ? 'weekend' : ''}">
                        <div class="day-label">
                            <span class="day-text">${date.label}</span>
                            ${date.hours ? `<span class="hours-tag">${escapeHtml(date.hours)}</span>` : ''}
                            ${date.event ? `<span class="event-tag">${escapeHtml(date.event)}</span>` : ''}
                        </div>
                        <select class="shift-start" data-idx="${i}">
                            <option value="">--</option>
                            ${d.timeOptions.map(t => `<option value="${t}" ${startVal === t ? 'selected' : ''}>${t}</option>`).join('')}
                        </select>
                        <span class="tilde">〜</span>
                        <select class="shift-end" data-idx="${i}">
                            <option value="">--</option>
                            ${d.timeOptions.map(t => `<option value="${t}" ${endVal === t ? 'selected' : ''}>${t}</option>`).join('')}
                        </select>
                        <button type="button" class="clear-btn" onclick="clearShiftRow(${i})">×</button>
                    </div>
                `;
            });
            html += `</div>`;

            html += `
                <label class="note-label">備考（自由記入）</label>
                <textarea class="note-input" id="shift-note" placeholder="例: 通院のため遅れる可能性あり、◯日は20時以降のみ可など">${escapeHtml(d.existingNote || '')}</textarea>
                <div style="font-size: 11px; color: #888; margin-top: 4px;">伝えたいことがあれば自由に記入してください。</div>
            `;

            html += `
                <button class="submit-btn" id="shift-submit-btn" onclick="submitShiftRequest()">提出する</button>
                <div class="msg" id="shift-submit-msg"></div>
            `;

            document.getElementById('shift-request-content').innerHTML = html;
            document.getElementById('shift-request-content').classList.remove('loading');
        }

        function clearShiftRow(idx) {
            document.querySelectorAll(`[data-idx="${idx}"]`).forEach(el => el.value = '');
        }

        async function submitShiftRequest() {
            const starts = document.querySelectorAll('.shift-start');
            const ends = document.querySelectorAll('.shift-end');
            const shifts = [];

            for (let i = 0; i < starts.length; i++) {
                const s = starts[i].value;
                const e = ends[i].value;
                if ((s && !e) || (!s && e)) {
                    showShiftMsg(`${i + 1}日目：開始時刻と終了時刻はセットで選択してください`, false);
                    return;
                }
                if (s && e && toMinutes(s) >= toMinutes(e)) {
                    showShiftMsg(`${i + 1}日目：終了時刻は開始時刻より後にしてください`, false);
                    return;
                }
                shifts.push(s && e ? `${s}-${e}` : '');
            }

            if (shiftRequestData.isAfterDeadline) {
                const warn = '⚠️ 警告 ⚠️\n\n提出期限を過ぎています。\n\n今回の提出は遅刻として記録され、回数がカウントされます。\n\n本当に提出しますか？';
                if (!confirm(warn)) return;
            } else {
                if (!confirm('この内容で提出しますか？')) return;
            }

            const btn = document.getElementById('shift-submit-btn');
            btn.disabled = true;
            btn.textContent = '送信中...';
            showShiftMsg('送信中...', true);

            try {
                const note = document.getElementById('shift-note').value;
                
                const response = await fetch(GAS_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'text/plain;charset=utf-8' },
                    body: JSON.stringify({
                        action: 'submitShiftRequest',
                        lineUserId: lineProfile.userId,
                        period: shiftRequestData.period,
                        shifts: shifts,
                        note: note
                    })
                });

                const result = await response.json();
                
                btn.disabled = false;
                btn.textContent = '提出する';

                if (result.success) {
                    if (result.data.isAfterDeadline) {
                        showShiftMsg('⚠️ 提出完了しました（締切後提出として記録されました）', true);
                    } else {
                        showShiftMsg('✓ 提出完了しました！', true);
                    }
                    setTimeout(() => loadShiftRequestForm(), 1500);
                } else {
                    showShiftMsg('エラー: ' + (result.error || '送信に失敗しました'), false);
                }
            } catch (error) {
                btn.disabled = false;
                btn.textContent = '提出する';
                showShiftMsg('エラー: ' + error.message, false);
            }
        }

        function toMinutes(t) {
            const [h, m] = t.split(':').map(Number);
            return h * 60 + m;
        }

        function showShiftMsg(text, ok) {
            const msg = document.getElementById('shift-submit-msg');
            msg.textContent = text;
            msg.className = 'msg ' + (ok ? 'msg-ok' : 'msg-err');
        }

        function escapeHtml(str) {
            if (!str) return '';
            return String(str)
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;')
                .replace(/"/g, '&quot;')
                .replace(/'/g, '&#39;');
        }

        function getStatusTag(status) {
            const tags = {
                leader: '<span class="shift-tag tag-leader">🟢 リーダー</span>',
                kabuki_help: '<span class="shift-tag tag-kabuki_help">🟣 KABUKIヘルプ</span>',
                absent: '<span class="shift-tag tag-absent">🔴 当日欠勤</span>',
                late: '<span class="shift-tag tag-late">🟪 遅刻</span>',
                normal: ''
            };
            return tags[status] || '';
        }

        function toggleDay(dayId) {
            const body = document.getElementById(`${dayId}-body`);
            const toggle = document.getElementById(`${dayId}-toggle`);
            body.classList.toggle('open');
            toggle.classList.toggle('open');
        }

        function showNotRegistered(result) {
            document.getElementById('content').innerHTML = `
                <div class="header-card">
                    <div class="user-name">${lineProfile.displayName} さん</div>
                </div>
                <div class="error">
                    キャスト名簿に登録されていません。<br>
                    管理者にお問い合わせください。
                </div>
                <div class="section">
                    <div style="font-size: 11px; color: #999; word-break: break-all;">
                        LINE User ID: ${lineProfile.userId}
                    </div>
                </div>
            `;
            document.getElementById('content').classList.remove('loading');
        }

        function showError(error) {
            document.getElementById('content').innerHTML = `
                <div class="error">
                    エラーが発生しました。<br>
                    <small>${error.message || error}</small>
                </div>
            `;
            document.getElementById('content').classList.remove('loading');
        }

        main();
    </script>
</body>
</html>
